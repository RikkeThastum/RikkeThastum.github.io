<!DOCTYPE html>
<html lang="da" data-lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekter — Rikke René Thastum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fff; --bg:#f4f7fb; --ink:#0f1b2d; --muted:#5b6b7f;
    --blue-deep:#0a2a43; --blue-primary:#1b4f8c; --blue-accent:#2f7dff;
    --grid-line:rgba(27,79,140,.12); --grid-line-strong:rgba(27,79,140,.22);
    --card-border:rgba(10,42,67,.14);
    --display-font:'Space Grotesk',sans-serif;
    --body-font:'IBM Plex Sans',sans-serif;
    --mono-font:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh; padding-left:112px; color:var(--ink); font-family:var(--body-font); line-height:1.55;
    background:linear-gradient(var(--grid-line) 1px,transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg,var(--grid-line) 1px,transparent 1px) 0 0/40px 40px,var(--bg);
  }
  .topbar{position:sticky;top:0;z-index:50;margin-left:-112px;background:rgba(244,247,251,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--grid-line-strong)}
  .topbar-inner{width:100%;max-width:none;margin:auto;padding:14px 30px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px}
  .brand-mini{display:none;font-family:var(--display-font);font-size:24px;font-weight:700;line-height:1;letter-spacing:.02em;color:var(--blue-deep);text-transform:uppercase}
  .side-rail{position:fixed;inset:0 auto 0 0;z-index:60;width:112px;background:var(--blue-primary);color:#fff;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--blue-deep)}
  .side-rail span{font-family:var(--display-font);font-size:34px;font-weight:700;letter-spacing:.1em;line-height:1;writing-mode:vertical-rl;transform:rotate(180deg);text-transform:uppercase}
  .controls,.lang-group,.page-nav{display:flex}.controls{grid-column:3;gap:8px;justify-content:flex-end}.page-nav{grid-column:2;gap:8px;justify-content:center}.lang-group{border:1px solid var(--blue-primary);border-radius:2px;overflow:hidden}
  .btn{display:inline-flex;align-items:center;font-family:var(--mono-font);font-size:12px;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;border:1px solid var(--blue-primary);background:transparent;color:var(--blue-primary);padding:9px 14px;border-radius:2px;cursor:pointer}
  .btn:hover,.btn[aria-pressed="true"]{background:var(--blue-primary);color:#fff}.lang-group .btn{border:0;border-radius:0}.lang-group .btn+.btn{border-left:1px solid var(--blue-primary)}
  .page-nav .btn.active{background:var(--blue-primary);color:#fff}
  .wrap{max-width:920px;margin:auto;padding:0 24px}
  .hero{padding:76px 0 42px;border-bottom:1px solid var(--grid-line-strong)}
  .eyebrow{font-family:var(--mono-font);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue-accent);margin-bottom:14px}
  h1{font-family:var(--display-font);font-size:clamp(38px,7vw,64px);line-height:1;color:var(--blue-deep);margin-bottom:18px}
  .intro{max-width:58ch;color:var(--muted);font-size:17px}
  .section{padding:42px 0}
  .section-head{display:flex;align-items:baseline;gap:14px;margin-bottom:26px}
  .section-tag{font-family:var(--mono-font);font-size:12px;color:var(--blue-accent)}
  .section-title{font-family:var(--display-font);font-size:22px;color:var(--blue-deep)}
  .section-line{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--blue-primary) 0 6px,transparent 6px 12px);opacity:.5}
  .project-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
  .project-card{background:var(--paper);border:1px solid var(--card-border);padding:22px;min-height:180px}
  .project-meta{font-family:var(--mono-font);font-size:11px;color:var(--blue-accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
  .project-card h3{font-family:var(--display-font);font-size:19px;color:var(--blue-deep);margin-bottom:8px}
  .project-card p{font-size:14px;color:var(--muted)}
  .empty{grid-column:1/-1;border:1px dashed var(--blue-primary);padding:32px;color:var(--muted);background:rgba(255,255,255,.65)}
  footer{padding:30px 0 60px;font-family:var(--mono-font);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;border-top:1px solid var(--grid-line-strong)}
  @media(max-width:640px){body{padding-left:0}.topbar{margin-left:0}.side-rail{display:none}.brand-mini{display:block}.topbar-inner{grid-template-columns:1fr;align-items:start;gap:12px}.page-nav,.controls{grid-column:1;justify-content:flex-start}.project-grid{grid-template-columns:1fr}}
  @media print{body{padding-left:0}.topbar,.side-rail{display:none}}
</style>
</head>
<body>
<aside class="side-rail" aria-label="Projects"><span data-i18n="page_name">Projekter</span></aside>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-mini" data-i18n="page_name">Projekter</div>
    <nav class="page-nav" aria-label="Sider / Pages">
      <a class="btn" href="index.html">CV</a>
      <a class="btn active" href="projects.html" aria-current="page" data-i18n="page_name">Projekter</a>
    </nav>
    <div class="controls">
      <div class="lang-group" role="group" aria-label="Sprogvalg / Language">
        <button class="btn" id="btn-da" aria-pressed="true" onclick="setLang('da')">DA</button>
        <button class="btn" id="btn-en" aria-pressed="false" onclick="setLang('en')">EN</button>
      </div>
      <button class="btn" onclick="window.print()" data-i18n="print_btn">Print</button>
    </div>
  </div>
</div>

<main class="wrap">
  <header class="hero">
    <div class="eyebrow" data-i18n="eyebrow">Udvalgt arbejde</div>
    <h1 data-i18n="title">Projekter</h1>
    <p class="intro" data-i18n="intro">Et udvalg af projekter inden for robotteknologi, autonome systemer, computer vision og kunstig intelligens.</p>
  </header>

  <section class="section">
    <div class="section-head">
      <h2 class="section-title" data-i18n="selected">Projektoversigt</h2>
      <span class="section-line"></span>
    </div>
    <div class="project-grid" id="project-grid"></div>
  </section>

  <footer><span>Rikke René Thastum — Projects</span><span id="year-mark"></span></footer>
</main>

<script>
  // Add projects here. Each project supports Danish and English text.
  const projects = [];

  const translations = {
    cv_btn:{da:"CV",en:"CV"},
    page_name:{da:"Projekter",en:"Projects"},
    print_btn:{da:"Print",en:"Print"},
    eyebrow:{da:"Udvalgt arbejde",en:"Selected work"},
    title:{da:"Projekter",en:"Projects"},
    intro:{
      da:"Et udvalg af projekter inden for robotteknologi, autonome systemer, computer vision og kunstig intelligens.",
      en:"A selection of projects in robotics, autonomous systems, computer vision and artificial intelligence."
    },
    selected:{da:"Projektoversigt",en:"Project overview"},
    empty:{da:"Projektbeskrivelser tilføjes snart.",en:"Project descriptions are coming soon."}
  };

  function buildProjects(lang){
    const grid=document.getElementById('project-grid');
    if(!projects.length){
      grid.innerHTML=`<p class="empty">${translations.empty[lang]}</p>`;
      return;
    }
    grid.innerHTML=projects.map((project,index)=>`
      <article class="project-card">
        <div class="project-meta">${String(index+1).padStart(2,'0')} // ${project.year}</div>
        <h3>${project.title[lang]}</h3>
        <p>${project.description[lang]}</p>
      </article>
    `).join('');
  }

  function setLang(lang){
    document.documentElement.lang=lang;
    document.documentElement.dataset.lang=lang;
    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const value=translations[el.dataset.i18n];
      if(value) el.textContent=value[lang];
    });
    document.getElementById('btn-da').setAttribute('aria-pressed',lang==='da');
    document.getElementById('btn-en').setAttribute('aria-pressed',lang==='en');
    document.title=lang==='da'?'Projekter — Rikke René Thastum':'Projects — Rikke René Thastum';
    localStorage.setItem('cv-lang',lang);
    buildProjects(lang);
  }

  document.getElementById('year-mark').textContent=new Date().getFullYear();
  setLang(localStorage.getItem('cv-lang')==='en'?'en':'da');
</script>
</body>
</html>
